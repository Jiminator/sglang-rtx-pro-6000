apiVersion: v1
kind: ServiceAccount
metadata:
  name: sglang-sa
  namespace: default
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: distributed-sglang-dsv4-pro
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: distributed-sglang-dsv4-pro
  serviceName: "sglang-master-pod-opt"
  template:
    metadata:
      labels:
        app: distributed-sglang-dsv4-pro
    spec:
      serviceAccountName: sglang-sa
      containers:
      - name: sglang-container
        image: docker.io/lmsysorg/sglang:dev-cu13
        imagePullPolicy: Always
        command:
        - /bin/bash
        - -c
        args:
        - |
          cd /sgl-workspace/sglang && git checkout . && git clean -fd
          python3 -m sglang.launch_server \
              --model-path deepseek-ai/DeepSeek-V4-Pro \
              --trust-remote-code \
              --tensor-parallel-size 8 \
              --pipeline-parallel-size 2 \
              --dp-size 8 \
              --enable-dp-attention \
              --nnodes 2 \
              --node-rank $POD_INDEX \
              --dist-init-addr sglang-master-pod-opt:5000 \
              --quantization fp8 \
              --kv-cache-dtype fp8_e4m3 \
              --attention-backend dsv4 \
              --disable-custom-all-reduce \
              --enable-flashinfer-allreduce-fusion \
              --mem-fraction-static 0.85 \
              --cuda-graph-max-bs 128 \
              --max-running-requests 768 \
              --chunked-prefill-size 16384 \
              --context-length 131072 \
              --page-size 256 \
              --enable-mixed-chunk \
              --reasoning-parser deepseek-v3 \
              --tool-call-parser deepseekv32 \
              --enable-metrics \
              --host 0.0.0.0 \
              --port 8000
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        - name: POD_INDEX
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
        - name: NCCL_DEBUG
          value: WARN
        - name: NCCL_SOCKET_IFNAME
          value: "eth0,eth1"
        - name: NCCL_IB_DISABLE
          value: "1"
        - name: NCCL_P2P_LEVEL
          value: "SYS"
        - name: NCCL_SOCKET_NTHREADS
          value: "8"
        - name: NCCL_NSOCKS_PERTHREAD
          value: "8"
        - name: NCCL_MIN_NCHANNELS
          value: "8"
        - name: NCCL_ALLOC_P2P_NET_LL_BUFFERS
          value: "1"
        - name: SGLANG_REQUEST_STATE_WAIT_TIMEOUT
          value: "18000"
        - name: SGLANG_ENABLE_SPEC_V2
          value: "1"
        - name: OMP_NUM_THREADS
          value: "24"
        - name: SGLANG_SET_CPU_AFFINITY
          value: "1"
        - name: SAFETENSORS_FAST_GPU
          value: "1"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "expandable_segments:True"
        - name: SGLANG_ENABLE_DEEP_GEMM
          value: "0"
        - name: SGLANG_ENABLE_JIT_DEEPGEMM
          value: "0"
        - name: SGLANG_DISABLE_DEEP_GEMM
          value: "1"
        - name: FLASHINFER_DISABLE_VERSION_CHECK
          value: "1"
        resources:
          limits:
            nvidia.com/gpu: "8"
          requests:
            nvidia.com/gpu: "8"
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /root/.cache/huggingface
          name: hf-cache
        - mountPath: /root/.cache/flashinfer
          name: flashinfer-cache
        securityContext:
          privileged: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        cloud.google.com/gke-nodepool: g4-384-np-0
      tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 32Gi
      - name: hf-cache
        emptyDir: {}
      - name: flashinfer-cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-master-pod-opt
  namespace: default
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: distributed-sglang-dsv4-pro
    apps.kubernetes.io/pod-index: "0"
  ports:
  - name: dist-port
    port: 5000
    targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-serving-dsv4-pro
  namespace: default
spec:
  type: NodePort
  selector:
    app: distributed-sglang-dsv4-pro
    apps.kubernetes.io/pod-index: "0"
  ports:
  - name: serving
    port: 8000
    targetPort: 8000
  - name: metrics
    port: 8080
    targetPort: 8080

