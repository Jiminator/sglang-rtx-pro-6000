piVersion: v1
kind: Pod
metadata:
  name: sglang-benchmark-batch-client
spec:
  # Pin to the GPU nodes so the benchmark runs on the same hardware
  nodeSelector:
    cloud.google.com/gke-nodepool: g4-384-np-1
  tolerations:
  - effect: NoSchedule
    key: nvidia.com/gpu
    operator: Exists
  restartPolicy: Never
  volumes:
  - name: workspace-volume
    emptyDir: {}
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 10Gi
  containers:
  - name: benchmark
    image: docker.io/lmsysorg/sglang:v0.5.10.post1
    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        nvidia.com/gpu: "1"
    volumeMounts:
    - name: workspace-volume
      mountPath: /workspace
    - name: dshm
      mountPath: /dev/shm
    command:
    - /bin/bash
    - -c
    args:
    - |
      echo "Starting SGLang bench_one_batch_server Load Test..."
      
      # Wait 5 seconds to bypass server startup self-test race conditions
      sleep 5
      
      # Pointing to the internal Kubernetes DNS name of your GPU server
      API_URL="http://sglang-serving-nvfp4-k26:8000"
      MODEL_PATH="nvidia/Kimi-K2.6-NVFP4"
      
      # --- CONFIGURATION START ---
      BATCH_SIZE=512
      INPUT_LEN=1024
      OUTPUT_LEN=8192
      # --- CONFIGURATION END ---

      python3 -m sglang.bench_one_batch_server \
          --base-url $API_URL \
          --model-path $MODEL_PATH \
          --batch-size $BATCH_SIZE \
          --input-len $INPUT_LEN \
          --output-len $OUTPUT_LEN \
          --skip-warmup \
          --result-filename /workspace/bench_one_batch_server_result.json

      echo "Benchmark complete! Results:"
      cat /workspace/bench_one_batch_server_result.json
      
      echo "Sleeping so you can extract the results..."
      sleep infinity