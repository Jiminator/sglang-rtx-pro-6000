OMP_NUM_THREADS=24 \
NCCL_DEBUG=INFO \
NCCL_SOCKET_NTHREADS=8
NCCL_NSOCKS_PERTHREAD=8
NCCL_IB_DISABLE=1
NCCL_P2P_LEVEL=SYS
NCCL_MIN_NCHANNELS=8
NCCL_ALLOC_P2P_NET_LL_BUFFERS=1
SGLANG_SET_CPU_AFFINITY=1
SAFETENSORS_FAST_GPU=1
PYTORCH_ALLOC_CONF=expandable_segments:True
SGLANG_ENABLE_DEEP_GEMM=0
SGLANG_ENABLE_JIT_DEEPGEMM=0


exec python3 -m sglang.launch_server \
    --model-path lukealonso/GLM-5.1-NVFP4 \
    --served-model-name GLM-5.1 \
    --reasoning-parser glm45 \
    --tool-call-parser glm47 \
    --tensor-parallel-size 8 \
    --pipeline-parallel-size 2 \
    --dp-size 8 \
    --enable-dp-attention \
    --nnodes 2 \
    --node-rank 0 \
    --dist-init-addr 10.0.1.2:5000 \
    --trust-remote-code \
    --quantization modelopt_fp4 \
    --kv-cache-dtype bfloat16 \
    --fp4-gemm-backend flashinfer_cutlass \
    --attention-backend flashinfer \
    --moe-runner-backend flashinfer_cutlass \
    --disable-shared-experts-fusion \
    --mem-fraction-static 0.90 \
    --max-running-requests 768 \
    --chunked-prefill-size 16384 \
    --cuda-graph-max-bs 128 \
    --page-size 64 \
    --enable-fused-moe-sum-all-reduce \
    --enable-dp-lm-head \
    --tokenizer-worker-num 16 \
    --enable-flashinfer-allreduce-fusion \
    --disable-custom-all-reduce \
    --disable-radix-cache \
    --host 0.0.0.0 \
    --port 30000
